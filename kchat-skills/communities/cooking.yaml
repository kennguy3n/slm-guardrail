# Community Overlay — kchat.community.cooking.guardrail.v1
#
# Cooking / recipes overlay. Lightweight scam and diet-misinformation
# guards.

skill_id: kchat.community.cooking.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
signers: [trust_and_safety]

community_profile:
  kind: cooking
  age_mode: mixed_age
  visibility: public_summary
  set_by: group_admin

rules:
  - category: 7   # SCAM_FRAUD
    action: warn
    note: >-
      Marketplace scams masquerading as ingredient-swap offers warn
      before display.
  - category: 13  # MISINFORMATION_HEALTH
    action: label_only
    note: >-
      Diet-myth claims surface a label only — peer-recipe context.
