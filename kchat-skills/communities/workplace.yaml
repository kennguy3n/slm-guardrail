# Community Overlay — kchat.community.workplace.guardrail.v1
#
# Professional / B2B overlay. Adult-only, with workplace-specific
# tightening of harassment, private-data leakage, and adult content.

skill_id: kchat.community.workplace.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
signers: [trust_and_safety]

community_profile:
  kind: workplace
  age_mode: adult_only
  visibility: members_only_summary
  set_by: group_admin

rules:
  - category: 5    # HARASSMENT
    action: warn
    suggest_mute: true
    note: >-
      Sexual or targeted harassment in a workplace setting warns before
      display and offers a peer-mute. Reports flow to the user, not the
      server.
  - category: 9    # PRIVATE_DATA
    action: warn
    suggest_redact: true
    note: >-
      Credentials, salary, customer PII, and other private business
      data suggest redaction before send.
  - category: 10   # SEXUAL_ADULT
    action: strong_warn
    note: >-
      Adult sexual content in a workplace channel surfaces a hard modal
      warning even in jurisdictions where category 10 is otherwise
      permissive.

group_risk_counters:
  - counter_id: group_scam_links_24h
    method: device_local_expiring_counter
    window: 24h
    thresholds:
      label_at:        3
      strong_label_at: 6
      escalate_at:     10
