# Community Overlay — kchat.community.tech_support.guardrail.v1
#
# Tech-support / IT overlay. Tightens scam, malware-link, and
# private-data handling against support-impersonation attacks.

skill_id: kchat.community.tech_support.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
signers: [trust_and_safety]

community_profile:
  kind: tech_support
  age_mode: adult_only
  visibility: members_only_summary
  set_by: group_admin

rules:
  - category: 7   # SCAM_FRAUD
    action: strong_warn
    note: >-
      Tech-support impersonation scams tightened to a hard modal
      warning.
  - category: 8   # MALWARE_LINK
    action: strong_warn
    note: >-
      Malware / phishing links tightened to a hard modal warning.
  - category: 9   # PRIVATE_DATA
    action: strong_warn
    suggest_redact: true
    note: >-
      Credential / token / TOTP leakage tightened to a hard modal
      warning.

group_risk_counters:
  - counter_id: group_scam_links_24h
    method: device_local_expiring_counter
    window: 24h
    thresholds:
      label_at: 3
      strong_label_at: 6
      escalate_at: 10
