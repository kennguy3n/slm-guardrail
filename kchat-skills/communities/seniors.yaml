# Community Overlay — kchat.community.seniors.guardrail.v1
#
# Seniors / older-adults overlay (adult-only). Tightens scam,
# private-data, and health-misinformation handling — the cohort most
# targeted by financial fraud.

skill_id: kchat.community.seniors.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
signers: [trust_and_safety]

community_profile:
  kind: seniors
  age_mode: adult_only
  visibility: members_only_summary
  set_by: group_admin

rules:
  - category: 7   # SCAM_FRAUD
    action: strong_warn
    note: >-
      Romance / IRS / utility-impersonation scams tightened to a hard
      modal warning.
  - category: 13  # MISINFORMATION_HEALTH
    action: warn
    note: >-
      Health-misinformation aimed at seniors (cures, supplements)
      warns before display.
  - category: 9   # PRIVATE_DATA
    action: strong_warn
    suggest_redact: true
    note: >-
      Bank, SSN, Medicare ID, and home address leakage tightened to a
      hard modal warning.

group_risk_counters:
  - counter_id: group_scam_links_24h
    method: device_local_expiring_counter
    window: 24h
    thresholds:
      label_at: 3
      strong_label_at: 6
      escalate_at: 10
