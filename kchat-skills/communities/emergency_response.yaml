# Community Overlay — kchat.community.emergency_response.guardrail.v1
#
# Emergency-response / disaster-coordination overlay (adult-only).
# Tightens health misinformation, scam, and private-data handling
# during incident response.

skill_id: kchat.community.emergency_response.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
signers: [trust_and_safety]

community_profile:
  kind: emergency_response
  age_mode: adult_only
  visibility: members_only_summary
  set_by: group_admin

rules:
  - category: 13  # MISINFORMATION_HEALTH
    action: strong_warn
    note: >-
      Disaster / pandemic health misinformation tightened to a hard
      modal warning.
  - category: 7   # SCAM_FRAUD
    action: strong_warn
    note: >-
      Disaster-relief / charity-impersonation scams tightened to a
      hard modal warning.
  - category: 9   # PRIVATE_DATA
    action: warn
    suggest_redact: true
    note: >-
      Survivor / responder PII leakage suggests redaction before
      send.

group_risk_counters:
  - counter_id: group_scam_links_24h
    method: device_local_expiring_counter
    window: 24h
    thresholds:
      label_at: 3
      strong_label_at: 6
      escalate_at: 10
