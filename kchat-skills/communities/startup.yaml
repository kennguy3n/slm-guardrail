# Community Overlay — kchat.community.startup.guardrail.v1
#
# Startup / founder overlay (adult-only). Tightens scam and
# private-data handling around investor outreach.

skill_id: kchat.community.startup.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
signers: [trust_and_safety]

community_profile:
  kind: startup
  age_mode: adult_only
  visibility: members_only_summary
  set_by: group_admin

rules:
  - category: 7   # SCAM_FRAUD
    action: strong_warn
    note: >-
      Investor-impersonation / advance-fee scams tightened to a hard
      modal warning.
  - category: 9   # PRIVATE_DATA
    action: warn
    suggest_redact: true
    note: >-
      Cap-table / customer PII leakage suggests redaction before
      send.

group_risk_counters:
  - counter_id: group_scam_links_24h
    method: device_local_expiring_counter
    window: 24h
    thresholds:
      label_at: 3
      strong_label_at: 6
      escalate_at: 10
