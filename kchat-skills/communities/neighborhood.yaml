# Community Overlay — kchat.community.neighborhood.guardrail.v1
#
# Neighborhood / local-community overlay. Tightens private-data
# (addresses, schedules) and watches for local-marketplace scams.

skill_id: kchat.community.neighborhood.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
signers: [trust_and_safety]

community_profile:
  kind: neighborhood
  age_mode: mixed_age
  visibility: public_summary
  set_by: group_admin

rules:
  - category: 7   # SCAM_FRAUD
    action: warn
    note: >-
      Local-marketplace scams (fake landlord, fake lost-pet) warn
      before display.
  - category: 9   # PRIVATE_DATA
    action: strong_warn
    suggest_redact: true
    note: >-
      Home addresses, school routes, and child schedules tightened to
      a hard modal warning.

group_risk_counters:
  - counter_id: group_scam_links_24h
    method: device_local_expiring_counter
    window: 24h
    thresholds:
      label_at: 3
      strong_label_at: 6
      escalate_at: 10
