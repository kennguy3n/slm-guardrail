# Community Overlay — kchat.community.marketplace.guardrail.v1
#
# Buy / sell / trade overlay. Tightens scam, illegal-goods, and
# drugs/weapons handling, and tracks scam-link bursts via a local
# expiring counter.

skill_id: kchat.community.marketplace.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
signers: [trust_and_safety]

community_profile:
  kind: marketplace
  age_mode: mixed_age
  visibility: public_summary
  set_by: group_admin

rules:
  - category: 7    # SCAM_FRAUD
    action: strong_warn
    note: >-
      Phishing, advance-fee fraud, fake giveaways, and impersonation
      surface a hard modal warning in marketplace channels.
  - category: 11   # DRUGS_WEAPONS
    action: strong_warn
    note: >-
      Sale or facilitation of drugs / firearms / regulated goods is
      tightened in marketplace contexts.
  - category: 12   # ILLEGAL_GOODS
    action: strong_warn
    note: >-
      Stolen goods, counterfeit currency, and trafficked items surface
      a hard modal warning.

group_risk_counters:
  - counter_id: group_scam_links_24h
    method: device_local_expiring_counter
    window: 24h
    thresholds:
      label_at:        3
      strong_label_at: 6
      escalate_at:     10
