# Community Overlay — kchat.community.book_club.guardrail.v1
#
# Book-club / reading-group overlay. Quiet harassment guard for
# discussion threads.

skill_id: kchat.community.book_club.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
signers: [trust_and_safety]

community_profile:
  kind: book_club
  age_mode: mixed_age
  visibility: public_summary
  set_by: group_admin

rules:
  - category: 5   # HARASSMENT
    action: warn
    suggest_mute: true
    note: >-
      Harassment of authors or members during discussion warns and
      offers a peer-mute.
