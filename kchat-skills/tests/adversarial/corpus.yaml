# Adversarial / obfuscation corpus.
#
# Spec reference: PHASES.md Phase 6 — "Adversarial / obfuscation test
# corpus". Each case describes an evasion technique a hostile
# sender might apply to bypass deterministic detectors. The pipeline's
# normalization step (pipeline.normalize_text) is expected to neutralise
# most of these so downstream detectors still match.
#
# Privacy contract: cases must NOT contain literal harmful payloads.
# Scam URLs are obviously fake (e.g. "paypa1-verify.example"); slur
# archetypes are represented with placeholder tokens (e.g.
# "<SLUR_TOKEN_A>"). ``expected_detection`` states whether the Phase 6
# pipeline's *normalized* form should allow a downstream detector /
# SLM to recognise the underlying category.

schema_version: 1

homoglyph_attacks:
  - case_id: homoglyph-001-paypal-cyrillic
    technique: homoglyph_attacks
    category: 7   # SCAM_FRAUD
    text: "Click here to confirm your раyраl.com login and аvoid суspension."
    expected_detection: true
    notes: |
      Cyrillic 'р' (U+0440) and 'а' (U+0430) substitute for Latin 'p'
      and 'a'. Normalization homoglyph map maps both to ASCII, so the
      scam keyword trigger ("confirm" + "login") still hits.

  - case_id: homoglyph-002-verify-account-greek
    technique: homoglyph_attacks
    category: 7
    text: "We detected suspicious activity, vεrify your αccount now."
    expected_detection: true
    notes: Greek epsilon (U+03B5) + alpha (U+03B1).

  - case_id: homoglyph-003-fullwidth-digits
    technique: homoglyph_attacks
    category: 7
    text: "Your tracking number ２０２４ has been delayed; update address."
    expected_detection: true
    notes: Fullwidth digits neutralised by NFKC.

  - case_id: homoglyph-004-cyrillic-suspended
    technique: homoglyph_attacks
    category: 7
    text: "Your ассount will be ѕuspended unless you verify immediately."
    expected_detection: true
    notes: Cyrillic 'с', 'с' and 'ѕ' (U+0455).

  - case_id: homoglyph-005-mixed-script-drug
    technique: homoglyph_attacks
    category: 11  # DRUGS_WEAPONS
    text: "Selling сheap p1lls and bаrs, DM for prices."
    expected_detection: true
    notes: Cyrillic + digit-1 substitution for "l"/"i".

  - case_id: homoglyph-006-giveaway-fullwidth
    technique: homoglyph_attacks
    category: 7
    text: "ＣＯＮＧＲＡＴＵＬＡＴＩＯＮＳ! You have won a prize, claim at example.xyz."
    expected_detection: true
    notes: Fullwidth Latin mapped to ASCII by NFKC.

  - case_id: homoglyph-007-love-scam-cyrillic
    technique: homoglyph_attacks
    category: 7
    text: "Hi dear, send mе a small gift via wire trаnsfer to continue."
    expected_detection: true
    notes: Cyrillic 'е' and 'а' — scam pattern persists post-normalization.

  - case_id: homoglyph-008-benign-greek-greeting
    technique: homoglyph_attacks
    category: 0
    text: "Xαίρετε, hope you have a wonderful afternoon today!"
    expected_detection: false
    notes: |
      Control case — benign Greek greeting. Should NOT trigger any
      scam pattern even after normalization.

  - case_id: homoglyph-009-phishing-login
    technique: homoglyph_attacks
    category: 7
    text: "Please login to your secure bаnk portal via https://example.top/verify ."
    expected_detection: true
    notes: Cyrillic 'а'. URL pattern + login keyword remains visible.

  - case_id: homoglyph-010-mixed-latin-cyrillic
    technique: homoglyph_attacks
    category: 7
    text: "Update password immediately — cоnfirm the reset link from our team."
    expected_detection: true
    notes: Cyrillic 'о'. Credential-harvest pattern.

leetspeak:
  - case_id: leet-001-violence
    technique: leetspeak
    category: 3   # VIOLENCE_THREAT
    text: "I'm gonna k1ll you l8r if you don't stop."
    expected_detection: true
    notes: Numeric '1' and '8' substitutions for 'i' and 'ate'.

  - case_id: leet-002-drugs
    technique: leetspeak
    category: 11
    text: "S3lling dr0gs cheap, d3livery t0day."
    expected_detection: true
    notes: Classic '3'→e, '0'→o substitution.

  - case_id: leet-003-hate
    technique: leetspeak
    category: 6   # HATE
    text: "I h4t3 those p30ple and their music too."
    expected_detection: true
    notes: Numeric leetspeak.

  - case_id: leet-004-scam-credentials
    technique: leetspeak
    category: 7
    text: "V3rify your acc0unt at example.xyz/l0gin or face cl0sure."
    expected_detection: true
    notes: Scam pattern + leet URL.

  - case_id: leet-005-weapons
    technique: leetspeak
    category: 11
    text: "G0t n3w gl0cks for sale, msg for pr1ce list."
    expected_detection: true
