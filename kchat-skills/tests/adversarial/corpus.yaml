unicode_tricks:
  - case_id: unicode-001-zwj-scam
    technique: unicode_tricks
    category: 7
    text: "Verify\u200d your\u200d account\u200d at example.xyz/login\u200d now."
    expected_detection: true
    notes: Zero-width joiners inserted between words.

  - case_id: unicode-002-combining-marks
    technique: unicode_tricks
    category: 11
    text: "Se\u0301lli\u0301ng che\u0301ap pi\u0301lls onli\u0301ne."
    expected_detection: true
    notes: |
      Combining acute accents applied to each letter — NFKC collapses
      them into precomposed forms when available; downstream matching
      relies on casefold stripping marks for the remainder.

  - case_id: unicode-003-bidi-override
    technique: unicode_tricks
    category: 7
    text: "\u202etxt.exe\u202c looks like a safe document, open it."
    expected_detection: true
    notes: Right-to-left override spoofing file extensions.

  - case_id: unicode-004-mathematical-bold
    technique: unicode_tricks
    category: 7
    text: "𝐂𝐨𝐧𝐟𝐢𝐫𝐦 𝐲𝐨𝐮𝐫 𝐚𝐜𝐜𝐨𝐮𝐧𝐭 𝐧𝐨𝐰 at example.top/verify ."
    expected_detection: true
    notes: Mathematical Bold letters — NFKC folds to ASCII.

  - case_id: unicode-005-tag-characters
    technique: unicode_tricks
    category: 4
    text: "Join the cause\U000E0074\U000E0061\U000E0067\U000E0073 message me for details."
    expected_detection: true
    notes: Invisible Unicode TAG characters (U+E00xx) inserted.

  - case_id: unicode-006-fullwidth-latin
    technique: unicode_tricks
    category: 7
    text: "Ｖｅｒｉｆｙ ｙｏｕｒ ｌｏｇｉｎ immediately at example.zip/reset ."
    expected_detection: true
    notes: Fullwidth Latin — NFKC folds to ASCII.

  - case_id: unicode-007-soft-hyphen
    technique: unicode_tricks
    category: 11
    text: "Se\u00adllin\u00adg chea\u00adp pi\u00adlls in downtown."
    expected_detection: true
    notes: Soft hyphens (U+00AD) inserted between letters.

  - case_id: unicode-008-variation-selector
    technique: unicode_tricks
    category: 6
    text: "I ha\ufe0fte them\ufe0f all and want them gone."
    expected_detection: true
    notes: Variation selectors (VS16) inserted.

  - case_id: unicode-009-benign-math-italic
    technique: unicode_tricks
    category: 0
    text: "𝐻𝑎𝑝𝑝𝑦 𝑏𝑖𝑟𝑡ℎ𝑑𝑎𝑦 to you, hope you have a lovely day."
    expected_detection: false
    notes: |
      Control case — benign Mathematical Italic script normalises
      to ASCII without matching any category.

  - case_id: unicode-010-hebrew-bidi
    technique: unicode_tricks
    category: 7
    text: "The file \u202eexe.repaper\u202c is safe to execute, trust me."
    expected_detection: true
    notes: BiDi override spoofing file extension (paper.exe → exe.repaper).

whitespace_insertion:
  - case_id: ws-001-spaces-in-slur
    technique: whitespace_insertion
    category: 6
    text: "I h a t e them all and wish them the worst possible outcome."
    expected_detection: true
    notes: Single spaces between letters — normalizer should fold.

  - case_id: ws-002-tabs-in-drug
    technique: whitespace_insertion
    category: 11
    text: "s\tel\tli\tng\tche\tap\tpi\tlls\tin downtown today, msg me."
    expected_detection: true
    notes: Tab characters mid-word.

  - case_id: ws-003-nbsp-in-scam
    technique: whitespace_insertion
    category: 7
    text: "Verify\u00a0your\u00a0account\u00a0or\u00a0face\u00a0suspension."
    expected_detection: true
    notes: Non-breaking spaces.

  - case_id: ws-004-zerowidth-space
    technique: whitespace_insertion
    category: 4
    text: "Jo\u200bin t\u200bhe ca\u200buse a\u200bnd fi\u200bght wi\u200bth us."
    expected_detection: true
    notes: Zero-width spaces inserted.

  - case_id: ws-005-linebreaks-in-threat
    technique: whitespace_insertion
    category: 3
    text: "I'm\ngoing\nto\nhurt\nyou\ntonight, no escape."
    expected_detection: true
    notes: Line breaks splitting threatening phrase.

  - case_id: ws-006-ideographic-space
    technique: whitespace_insertion
    category: 7
    text: "Confirm\u3000your\u3000login\u3000now\u3000at example.xyz/verify ."
    expected_detection: true
    notes: Ideographic space (U+3000) — NFKC folds to ASCII space.

  - case_id: ws-007-benign-multi-space
    technique: whitespace_insertion
    category: 0
    text: "Hello  there,  hope  you  have  a  wonderful  afternoon  today."
    expected_detection: false
    notes: Control case — benign double spacing.

  - case_id: ws-008-figure-space
    technique: whitespace_insertion
    category: 7
    text: "Your\u2007account\u2007needs\u2007verification\u2007asap\u2007."
    expected_detection: true
    notes: Figure space (U+2007).

  - case_id: ws-009-em-space
    technique: whitespace_insertion
    category: 11
    text: "Se\u2003ll\u2003ing\u2003c\u2003ha\u2003rs in downtown, cash only."
    expected_detection: true
    notes: Em spaces inserted mid-word.

  - case_id: ws-010-hair-space
    technique: whitespace_insertion
    category: 6
    text: "I\u200ah\u200aate\u200athem\u200aall completely."
    expected_detection: true
    notes: Hair space (U+200A).

