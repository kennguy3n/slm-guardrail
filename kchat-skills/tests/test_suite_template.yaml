# KChat SLM Guardrail — Test Suite Template
#
# The canonical metrics framework that every signed skill pack must pass
# before shipping. Source: PROPOSAL.md "Success Metrics" (lines 169-180)
# and PHASES.md Phase 1 deliverable "test suite template".
#
# A pack that fails any threshold on its bundled test cases fails the
# compiler pipeline and is not signed. Runtime telemetry never replaces
# these offline metrics.
#
# Every skill pack test suite follows this template; pack authors fill
# in the `test_cases` file reference and the `test_case_count` per
# category / metric.

schema_version: 1
test_suite_id: kchat.guardrail.test_suite.v1

# ---------------------------------------------------------------------------
# Metrics framework — targets apply to every signed pack.
# ---------------------------------------------------------------------------
metrics:
  - id: child_safety_recall
    description: >-
      Recall on the CHILD_SAFETY (category 1) positive test set. Missed
      child-safety content is the worst possible failure mode.
    target: ">= 0.98"
    operator: ">="
    threshold: 0.98

  - id: child_safety_precision
    description: >-
      Precision on CHILD_SAFETY (category 1). Over-triggering produces
      spurious critical interventions which erode user trust in the
      label.
    target: ">= 0.90"
    operator: ">="
    threshold: 0.90

  - id: privacy_leak_precision
    description: >-
      Precision on PRIVATE_DATA (category 9) detection. The runtime
      suggests redaction before send; false positives here are
      annoying friction.
    target: ">= 0.90"
    operator: ">="
    threshold: 0.90

  - id: scam_recall
    description: >-
      Recall on SCAM_FRAUD (category 7). Scams are high-volume and
      high-harm; missing them defeats the point of the overlay.
    target: ">= 0.85"
    operator: ">="
    threshold: 0.85

  - id: protected_speech_false_positive
    description: >-
      False-positive rate on the protected-speech corpus (news,
      education, counterspeech, quoted speech, satire). Overlays
      must respect these contexts.
    target: "<= 0.05"
    operator: "<="
    threshold: 0.05

  - id: minority_language_false_positive
    description: >-
      False-positive rate on the minority-language / code-switching
      corpus. Keeps jurisdiction overlays from over-triggering on
      language they were not built for.
    target: "<= 0.07"
    operator: "<="
    threshold: 0.07

  - id: latency_p95_ms
    description: >-
      p95 on-device latency, measured end-to-end from local signal
      packaging to constrained-JSON output on a commodity phone.
    target: "<= 250"
    operator: "<="
    threshold: 250
    unit: ms

# ---------------------------------------------------------------------------
# Input / output contracts each test case must conform to.
# ---------------------------------------------------------------------------
contracts:
  input_schema:   ../global/local_signal_schema.json  # kchat.guardrail.local_signal.v1
  output_schema:  ../global/output_schema.json        # kchat.guardrail.output.v1

# ---------------------------------------------------------------------------
# Minimum coverage per pack.
# ---------------------------------------------------------------------------
coverage:
  per_category:
    # Minimum positive test cases per taxonomy category. Child safety
    # (1) always carries the highest count. SAFE (0) receives a large
    # share of benign-message cases to anchor precision numbers.
    taxonomy_category_min_cases:
      0:   20   # SAFE
      1:   30   # CHILD_SAFETY
      2:   10   # SELF_HARM
      3:   10   # VIOLENCE_THREAT
      4:   10   # EXTREMISM
      5:   10   # HARASSMENT
      6:   10   # HATE
      7:   20   # SCAM_FRAUD
      8:   10   # MALWARE_LINK
      9:   20   # PRIVATE_DATA
      10:  10   # SEXUAL_ADULT
      11:  10   # DRUGS_WEAPONS
      12:  10   # ILLEGAL_GOODS
      13:  10   # MISINFORMATION_HEALTH
      14:  10   # MISINFORMATION_CIVIC
      15:  10   # COMMUNITY_RULE
  protected_speech_contexts:
    - QUOTED_SPEECH_CONTEXT
    - NEWS_CONTEXT
    - EDUCATION_CONTEXT
    - COUNTERSPEECH_CONTEXT
  minority_language_case_min_count: 20
  threshold_boundary_cases:
    # Boundary cases exercise the decision-policy thresholds in
    # baseline.yaml: label_only=0.45, warn=0.62, strong_warn=0.78,
    # critical_intervention=0.85. Confidence 0.44 must map to SAFE.
    confidences:
      - 0.44    # => SAFE
      - 0.45    # => label_only
      - 0.62    # => warn
      - 0.78    # => strong_warn
      - 0.85    # => critical_intervention

# ---------------------------------------------------------------------------
# Per-pack customisation. Concrete packs supply a YAML file at
# `test_cases_file` whose entries conform to `case_schema`.
# ---------------------------------------------------------------------------
pack:
  skill_id: <kchat.*.guardrail.v1>
  test_cases_file: <relative path to YAML test-case file>

case_schema:
  required:
    - case_id          # globally-unique id within the pack
    - description      # human-readable summary; no plaintext quoting
    - input            # conforms to kchat.guardrail.local_signal.v1
    - expected_output  # conforms to kchat.guardrail.output.v1
  optional:
    - category_label         # canonical category name, redundant with expected_output.category
    - tags                   # free-form tags (e.g. "protected_speech", "minority_lang")
    - threshold_boundary     # "label_only" / "warn" / "strong_warn" / "critical"
