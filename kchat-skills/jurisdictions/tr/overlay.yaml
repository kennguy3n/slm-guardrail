# kchat.jurisdiction.tr.guardrail.v1
#
# Türkiye jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Türk Ceza Kanunu (TCK) child protection; TMK anti-terrorism; Law 5651 internet content.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.tr.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: tr
    - group_declared_jurisdiction: tr
    - app_store_install_region: tr
    - enterprise_managed_policy: tr
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Anayasa Art. 10 + TCK Art. 122.
  protected_classes:
    - language
    - race
    - colour
    - sex
    - disability
    - political_opinion
    - philosophical_belief
    - religion
    - sect
    - ethnic_origin
    - age
  listed_extremist_orgs:
    - tr_listed_extremist_orgs_v1
  restricted_symbols:
    - tr_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2028-03-01"
    civic_window_close: "2028-06-15"
    authority_resource_id: tr_ysk_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [tr]
  lexicons:
    - lexicon_id: tr_tr_lexicon_v1
      language: tr
      categories: [1, 4]
      provenance: kchat_trust_and_safety_tr_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      TCK Art. 103 — cinsel istismar; TCK Art. 226 — müstehcenlik. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Terörle Mücadele Kanunu (TMK) 3713. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Türkiye safety pack. Raises floors on child protection (TCK Art. 103 / 226) and anti-terrorism (TMK 3713). Protected speech remains permitted.
  appeal_resource_id: tr_appeal_resource_v1
  opt_out_allowed: false
