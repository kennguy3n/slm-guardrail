# kchat.jurisdiction.es.guardrail.v1
#
# Spain jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Ley Orgánica de Protección del Menor; Código Penal Art. 571-580 (terrorismo).
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.es.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: es
    - group_declared_jurisdiction: es
    - app_store_install_region: es
    - enterprise_managed_policy: es
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Constitución Española Art. 14 + Ley Integral 15/2022.
  protected_classes:
    - birth
    - race
    - ethnic_origin
    - sex
    - gender_identity
    - sexual_orientation
    - religion
    - opinion
    - age
    - disability
    - language
    - social_condition
  listed_extremist_orgs:
    - es_listed_extremist_orgs_v1
  restricted_symbols:
    - es_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-09-15"
    civic_window_close: "2027-12-15"
    authority_resource_id: es_jec_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [es, ca, eu, gl]
  lexicons:
    - lexicon_id: es_es_lexicon_v1
      language: es
      categories: [1, 4]
      provenance: kchat_trust_and_safety_es_v1
    - lexicon_id: es_ca_lexicon_v1
      language: ca
      categories: [1, 4]
      provenance: kchat_trust_and_safety_es_v1
    - lexicon_id: es_eu_lexicon_v1
      language: eu
      categories: [1, 4]
      provenance: kchat_trust_and_safety_es_v1
    - lexicon_id: es_gl_lexicon_v1
      language: gl
      categories: [1, 4]
      provenance: kchat_trust_and_safety_es_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Ley Orgánica 1/1996 de Protección Jurídica del Menor + Ley Orgánica 8/2021. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Código Penal Art. 571-580 — delitos de terrorismo. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Spain safety pack. Raises floors on child protection (LOPJM) and terrorism offences. Protected speech remains permitted.
  appeal_resource_id: es_appeal_resource_v1
  opt_out_allowed: true
