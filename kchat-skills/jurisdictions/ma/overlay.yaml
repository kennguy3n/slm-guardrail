# kchat.jurisdiction.ma.guardrail.v1
#
# Morocco jurisdiction overlay — Phase 6 expansion country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Code Pénal Art. 503 child protection; Loi 03-03 anti-terrorism.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.ma.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: ma
    - group_declared_jurisdiction: ma
    - app_store_install_region: ma
    - enterprise_managed_policy: ma
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  protected_classes:
    - sex
    - race
    - ethnic_origin
    - religion
    - disability
    - language
  listed_extremist_orgs:
    - ma_listed_extremist_orgs_v1
  restricted_symbols:
    - ma_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2026-09-01"
    civic_window_close: "2026-10-15"
    authority_resource_id: ma_cndh_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [ar, fr]
  lexicons:
    - lexicon_id: ma_ar_lexicon_v1
      language: ar
      categories: [1, 4]
      provenance: kchat_trust_and_safety_ma_v1
    - lexicon_id: ma_fr_lexicon_v1
      language: fr
      categories: [1, 4]
      provenance: kchat_trust_and_safety_ma_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Code Pénal Art. 503-1 et Art. 503-2 (protection des mineurs). Protected-speech contexts (quoted speech,
      news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Loi 03-03 relative à la lutte contre le terrorisme. Protected-speech contexts (quoted speech,
      news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Morocco safety pack. Raises floors on child protection (Code Pénal Art. 503) and terrorism (Loi 03-03). Protected speech remains permitted.
  appeal_resource_id: ma_appeal_resource_v1
  opt_out_allowed: true
