# kchat.jurisdiction.th.guardrail.v1
#
# Thailand jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Child Protection Act B.E. 2546; Computer Crime Act; lèse-majesté (Criminal Code §112).
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.th.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: th
    - group_declared_jurisdiction: th
    - app_store_install_region: th
    - enterprise_managed_policy: th
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 20
  legal_age_marketplace_tobacco: 20
  # Protected-class enumeration from Constitution Art. 27 + Gender Equality Act B.E. 2558.
  protected_classes:
    - origin
    - race
    - language
    - sex
    - age
    - disability
    - physical_or_health_condition
    - personal_status
    - economic_or_social_status
    - religious_belief
    - education
    - political_view
  listed_extremist_orgs:
    - th_listed_extremist_orgs_v1
  restricted_symbols:
    - th_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-02-15"
    civic_window_close: "2027-05-31"
    authority_resource_id: th_ect_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [th]
  lexicons:
    - lexicon_id: th_th_lexicon_v1
      language: th
      categories: [1, 4, 6]
      provenance: kchat_trust_and_safety_th_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1, translit_thai_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Child Protection Act B.E. 2546 (2003). Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Computer Crime Act B.E. 2560 §14(3) — national-security content. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 6   # HATE
    severity_floor: 5
    note: >-
      Criminal Code §112 — lèse-majesté; §326 defamation aggravations. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Thailand safety pack. Raises floors on child protection, Computer Crime Act national-security content, and Criminal Code §112. Protected speech remains permitted.
  appeal_resource_id: th_appeal_resource_v1
  opt_out_allowed: false
