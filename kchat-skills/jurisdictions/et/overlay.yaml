# kchat.jurisdiction.et.guardrail.v1
#
# Ethiopia jurisdiction overlay — Phase 6 expansion country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Criminal Code Art. 644 (child sexual abuse); Anti-Terrorism Proclamation 1176/2020.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.et.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: et
    - group_declared_jurisdiction: et
    - app_store_install_region: et
    - enterprise_managed_policy: et
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  protected_classes:
    - sex
    - race
    - ethnic_origin
    - religion
    - disability
    - language
  listed_extremist_orgs:
    - et_listed_extremist_orgs_v1
  restricted_symbols:
    - et_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2026-05-01"
    civic_window_close: "2026-06-15"
    authority_resource_id: et_nebe_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [am, en]
  lexicons:
    - lexicon_id: et_am_lexicon_v1
      language: am
      categories: [1, 4]
      provenance: kchat_trust_and_safety_et_v1
    - lexicon_id: et_en_lexicon_v1
      language: en
      categories: [1, 4]
      provenance: kchat_trust_and_safety_et_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Criminal Code Art. 644 (sexual outrage on minors). Protected-speech contexts (quoted speech,
      news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Anti-Terrorism Proclamation No. 1176/2020. Protected-speech contexts (quoted speech,
      news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Ethiopia safety pack. Raises floors on child protection (Criminal Code Art. 644) and terrorism (Proclamation 1176/2020). Protected speech remains permitted.
  appeal_resource_id: et_appeal_resource_v1
  opt_out_allowed: true
