# kchat.jurisdiction.ca.guardrail.v1
#
# Canada jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Criminal Code child exploitation, Criminal Code terrorism, Competition Act fraud.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.ca.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: ca
    - group_declared_jurisdiction: ca
    - app_store_install_region: ca
    - enterprise_managed_policy: ca
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 19
  legal_age_marketplace_tobacco: 19
  # Protected-class enumeration from Canadian Human Rights Act §3(1).
  protected_classes:
    - race
    - national_or_ethnic_origin
    - colour
    - religion
    - age
    - sex
    - sexual_orientation
    - gender_identity_or_expression
    - marital_status
    - family_status
    - genetic_characteristics
    - disability
    - conviction_for_which_a_pardon_has_been_granted
  listed_extremist_orgs:
    - ca_listed_terrorist_entities_v1
  restricted_symbols:
    - ca_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-08-15"
    civic_window_close: "2027-10-31"
    authority_resource_id: ca_elections_canada_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [en, fr]
  lexicons:
    - lexicon_id: ca_en_lexicon_v1
      language: en
      categories: [1, 4, 7]
      provenance: kchat_trust_and_safety_ca_v1
    - lexicon_id: ca_fr_lexicon_v1
      language: fr
      categories: [1, 4, 7]
      provenance: kchat_trust_and_safety_ca_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Criminal Code §163.1 child exploitation / CSAM. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Criminal Code Part II.1 terrorism offences / listed entities. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 7   # SCAM_FRAUD
    severity_floor: 3
    note: >-
      Competition Act §52 / Criminal Code fraud provisions. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Canada safety pack. Raises floors on child exploitation, terrorism offences, and consumer fraud. Protected speech remains permitted under the Charter §2(b) carve-outs.
  appeal_resource_id: ca_appeal_resource_v1
  opt_out_allowed: true
