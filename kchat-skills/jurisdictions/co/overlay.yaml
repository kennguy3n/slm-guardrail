# kchat.jurisdiction.co.guardrail.v1
#
# Colombia jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Código de la Infancia y la Adolescencia (Ley 1098); anti-terrorism provisions.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.co.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: co
    - group_declared_jurisdiction: co
    - app_store_install_region: co
    - enterprise_managed_policy: co
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Ley 1482 de 2011 (anti-discriminación).
  protected_classes:
    - race
    - ethnic_origin
    - national_origin
    - religion
    - ideology
    - political_opinion
    - sex
    - gender_identity
    - sexual_orientation
    - disability
    - social_condition
  listed_extremist_orgs:
    - co_listed_extremist_orgs_v1
  restricted_symbols:
    - co_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-08-01"
    civic_window_close: "2027-10-31"
    authority_resource_id: co_registraduria_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [es]
  lexicons:
    - lexicon_id: co_es_lexicon_v1
      language: es
      categories: [1, 4]
      provenance: kchat_trust_and_safety_co_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Ley 1098 de 2006 — Código de la Infancia y la Adolescencia. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Ley 1121 de 2006 y Código Penal Título XII — delitos de terrorismo. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Colombia safety pack. Raises floors on child protection (Ley 1098) and anti-terrorism provisions. Protected speech remains permitted.
  appeal_resource_id: co_appeal_resource_v1
  opt_out_allowed: true
