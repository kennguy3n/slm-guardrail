# kchat.jurisdiction.fr.guardrail.v1
#
# France jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Loi Avia / DSA transposition (apologie du terrorisme); loi Gayssot (hate); child protection.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.fr.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: fr
    - group_declared_jurisdiction: fr
    - app_store_install_region: fr
    - enterprise_managed_policy: fr
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Code pénal Art. 225-1.
  protected_classes:
    - origin
    - sex
    - family_situation
    - pregnancy
    - physical_appearance
    - surname
    - place_of_residence
    - health_status
    - disability
    - genetic_characteristics
    - customs
    - sexual_orientation
    - gender_identity
    - age
    - political_opinion
    - trade_union_activity
    - ethnicity
    - nationality
    - race
    - religion
    - language
  listed_extremist_orgs:
    - fr_listed_extremist_orgs_v1
  restricted_symbols:
    - fr_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-03-01"
    civic_window_close: "2027-05-31"
    authority_resource_id: fr_ministere_interieur_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [fr]
  lexicons:
    - lexicon_id: fr_fr_lexicon_v1
      language: fr
      categories: [1, 4, 6]
      provenance: kchat_trust_and_safety_fr_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Code pénal Art. 227-22 à 227-24 — protection des mineurs / CSAM. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 5
    note: >-
      Loi Avia / DSA transposition + Code pénal Art. 421-2-5 — apologie du terrorisme. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 6   # HATE
    severity_floor: 4
    note: >-
      Loi Gayssot (1990) + Code pénal Art. 24 loi 1881 — discours de haine. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    France safety pack. Raises floors on child protection, apologie du terrorisme (Loi Avia / DSA), and hate speech (Loi Gayssot). News, education, counterspeech, and quoted speech remain protected.
  appeal_resource_id: fr_appeal_resource_v1
  opt_out_allowed: true
