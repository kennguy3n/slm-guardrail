# kchat.jurisdiction.my.guardrail.v1
#
# Malaysia jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Child Act 2001; SOSMA 2012; Sedition Act 1948.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.my.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: my
    - group_declared_jurisdiction: my
    - app_store_install_region: my
    - enterprise_managed_policy: my
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 21
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Perlembagaan Persekutuan Perkara 8.
  protected_classes:
    - religion
    - race
    - descent
    - place_of_birth
    - sex
    - gender_identity
    - sexual_orientation
    - age
    - disability
    - language
  listed_extremist_orgs:
    - my_listed_extremist_orgs_v1
  restricted_symbols:
    - my_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-09-15"
    civic_window_close: "2027-12-15"
    authority_resource_id: my_spr_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [ms, en]
  lexicons:
    - lexicon_id: my_ms_lexicon_v1
      language: ms
      categories: [1, 4]
      provenance: kchat_trust_and_safety_my_v1
    - lexicon_id: my_en_lexicon_v1
      language: en
      categories: [1, 4]
      provenance: kchat_trust_and_safety_my_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Child Act 2001 (Akta 611). Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Security Offences (Special Measures) Act 2012 — SOSMA. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Malaysia safety pack. Raises floors on child protection (Akta Kanak-Kanak 2001) and anti-terrorism (SOSMA 2012). Protected speech remains permitted.
  appeal_resource_id: my_appeal_resource_v1
  opt_out_allowed: false
