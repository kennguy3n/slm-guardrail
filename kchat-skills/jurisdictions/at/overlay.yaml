# kchat.jurisdiction.at.guardrail.v1
#
# Austria jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   StGB child protection; Verbotsgesetz 1945 (Nazi glorification ban).
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.at.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: at
    - group_declared_jurisdiction: at
    - app_store_install_region: at
    - enterprise_managed_policy: at
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 16
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Bundes-Verfassungsgesetz Art. 7 + Gleichbehandlungsgesetz.
  protected_classes:
    - race
    - skin_colour
    - ethnic_origin
    - national_origin
    - religion
    - political_opinion
    - sex
    - gender_identity
    - sexual_orientation
    - age
    - disability
    - language
  listed_extremist_orgs:
    - at_listed_extremist_orgs_v1
  restricted_symbols:
    - at_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2029-08-01"
    civic_window_close: "2029-10-15"
    authority_resource_id: at_bundeswahlbehoerde_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [de]
  lexicons:
    - lexicon_id: at_de_lexicon_v1
      language: de
      categories: [1, 4]
      provenance: kchat_trust_and_safety_at_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      StGB §207a — pornografische Darstellungen Minderjähriger. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 5
    note: >-
      Verbotsgesetz 1945 — NS-Wiederbetätigung. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Austria safety pack. Raises floors on child protection (StGB §207a) and the Verbotsgesetz 1945 ban on Nazi glorification. Protected speech remains permitted.
  appeal_resource_id: at_appeal_resource_v1
  opt_out_allowed: true
