# kchat.jurisdiction.nz.guardrail.v1
#
# New Zealand jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Films, Videos, and Publications Classification Act; Terrorism Suppression Act 2002.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.nz.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: nz
    - group_declared_jurisdiction: nz
    - app_store_install_region: nz
    - enterprise_managed_policy: nz
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Human Rights Act 1993 §21.
  protected_classes:
    - sex
    - marital_status
    - religious_belief
    - ethical_belief
    - colour
    - race
    - ethnic_or_national_origin
    - disability
    - age
    - political_opinion
    - employment_status
    - family_status
    - sexual_orientation
    - gender_identity
  listed_extremist_orgs:
    - nz_listed_terrorist_entities_v1
  restricted_symbols:
    - nz_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2026-08-01"
    civic_window_close: "2026-10-31"
    authority_resource_id: nz_electoral_commission_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [en, mi]
  lexicons:
    - lexicon_id: nz_en_lexicon_v1
      language: en
      categories: [1, 4]
      provenance: kchat_trust_and_safety_nz_v1
    - lexicon_id: nz_mi_lexicon_v1
      language: mi
      categories: [1, 4]
      provenance: kchat_trust_and_safety_nz_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Films, Videos, and Publications Classification Act 1993 §123 — objectionable publications. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Terrorism Suppression Act 2002. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    New Zealand safety pack. Raises floors on child protection (FVPCA 1993) and terrorism suppression (TSA 2002). Protected speech remains permitted.
  appeal_resource_id: nz_appeal_resource_v1
  opt_out_allowed: true
