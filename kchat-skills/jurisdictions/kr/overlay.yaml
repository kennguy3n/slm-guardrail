# kchat.jurisdiction.kr.guardrail.v1
#
# South Korea jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Act on the Protection of Children and Youth; National Security Act; KCSC content regulation.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.kr.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: kr
    - group_declared_jurisdiction: kr
    - app_store_install_region: kr
    - enterprise_managed_policy: kr
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 19
  legal_age_marketplace_tobacco: 19
  # Protected-class enumeration from 대한민국 헌법 Art. 11 + National Human Rights Commission Act §2.
  protected_classes:
    - sex
    - religion
    - disability
    - age
    - social_status
    - region_of_origin
    - nationality
    - ethnic_origin
    - race
    - language
    - sexual_orientation
    - gender_identity
    - political_opinion
    - marital_status
    - pregnancy_or_childbirth
    - family_form
    - medical_history
  listed_extremist_orgs:
    - kr_listed_extremist_orgs_v1
  restricted_symbols:
    - kr_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-02-15"
    civic_window_close: "2027-04-30"
    authority_resource_id: kr_nec_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [ko]
  lexicons:
    - lexicon_id: kr_ko_lexicon_v1
      language: ko
      categories: [1, 4]
      provenance: kchat_trust_and_safety_kr_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1, translit_hangul_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Act on the Protection of Children and Youth against Sex Offences §11. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      National Security Act §7 — anti-state organisations. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    South Korea safety pack. Raises floors on child protection (청소년성보호법) and National Security Act §7. Protected speech remains permitted.
  appeal_resource_id: kr_appeal_resource_v1
  opt_out_allowed: true
