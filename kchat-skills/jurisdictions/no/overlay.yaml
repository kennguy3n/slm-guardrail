# kchat.jurisdiction.no.guardrail.v1
#
# Norway jurisdiction overlay — Phase 6 expansion country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Straffeloven §311 child protection; Straffeloven §131 terrorism.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.
#
# Note: the ISO-3166 code "no" and the ISO-639 code "no" both collide
# with YAML 1.1's boolean literal. All occurrences are explicitly
# quoted to keep them strings under PyYAML's safe loader.

skill_id: kchat.jurisdiction.no.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: "no"
    - group_declared_jurisdiction: "no"
    - app_store_install_region: "no"
    - enterprise_managed_policy: "no"
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  protected_classes:
    - sex
    - race
    - ethnic_origin
    - religion
    - disability
    - sexual_orientation
  listed_extremist_orgs:
    - no_listed_extremist_orgs_v1
  restricted_symbols:
    - no_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2025-08-01"
    civic_window_close: "2025-09-15"
    authority_resource_id: no_valgdirektoratet_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: ["no", nb]
  lexicons:
    - lexicon_id: no_no_lexicon_v1
      language: "no"
      categories: [1, 4]
      provenance: kchat_trust_and_safety_no_v1
    - lexicon_id: no_nb_lexicon_v1
      language: nb
      categories: [1, 4]
      provenance: kchat_trust_and_safety_no_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Straffeloven §311 (fremstilling av seksuelle overgrep mot barn).
      Protected-speech contexts (quoted speech, news, education,
      counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Straffeloven §131 (terrorhandling). Protected-speech contexts
      (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Norway safety pack. Raises floors on child protection
    (Straffeloven §311) and terrorism (Straffeloven §131). Protected
    speech remains permitted.
  appeal_resource_id: no_appeal_resource_v1
  opt_out_allowed: true
