# kchat.jurisdiction.de.guardrail.v1
#
# Germany jurisdiction overlay — first wave Phase 5 country pack.
# Layered on top of kchat.global.guardrail.baseline.
#
# Notable floors (above the global baseline):
#   * EXTREMISM (4)      -> severity_floor 5 (StGB §86a banned symbols
#                           + NetzDG enforcement obligations).
#   * HATE       (6)     -> severity_floor 4 (Volksverhetzung StGB §130).
#   * SEXUAL_ADULT (10)  -> severity_floor 3 (JuSchG youth protection
#                           on cross-platform delivery).
#
# Marketplace ages: alcohol 16 (beer/wine; spirits remain 18 as the
# default age under Jugendschutzgesetz), tobacco 18.
#
# Protected classes follow Grundgesetz Article 3, Allgemeines
# Gleichbehandlungsgesetz (AGG), and the BVerfG protected-attribute
# enumeration.

skill_id: kchat.jurisdiction.de.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: de
    - group_declared_jurisdiction: de
    - app_store_install_region: de
    - enterprise_managed_policy: de
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  # Jugendschutzgesetz §9 — beer / wine from 16, spirits from 18.
  # The conservative shipping value here is 16 (the lowest age at
  # which any alcohol marketplace transaction is lawful).
  legal_age_marketplace_alcohol: 16
  legal_age_marketplace_tobacco: 18
  # Grundgesetz Artikel 3 (Abs. 3) + AGG protected-attribute
  # enumeration. ``language`` is captured because it is enumerated
  # explicitly in Article 3 alongside the other classes.
  protected_classes:
    - race
    - ethnic_origin
    - sex
    - religion
    - disability
    - political_opinion
    - language
  # Provenance: BfV (Bundesamt für Verfassungsschutz) Verfassungsschutz-
  # bericht annual extremist-org listings. Catalogue-only.
  listed_extremist_orgs:
    - de_bfv_listed_orgs_v1
  restricted_symbols:
    - de_stgb_86a_restricted_symbols_v1
  election_rules:
    civic_window_open:  "2025-09-01"
    civic_window_close: "2025-09-28"
    authority_resource_id: de_bundeswahlleiter_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [de]
  lexicons:
    - lexicon_id: de_de_lexicon_v1
      language: de
      categories: [4, 6, 11]
      provenance: kchat_trust_and_safety_de_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 4   # EXTREMISM
    severity_floor: 5
    note: >-
      Recruitment / glorification of BfV-listed extremist orgs and
      use of StGB §86a banned symbols is treated as a jurisdictional
      ban (severity 5). NetzDG / DSA-aligned enforcement.
  - category: 6   # HATE
    severity_floor: 4
    note: >-
      Volksverhetzung (StGB §130) — incitement to hatred against a
      protected class is raised to the strong-warn floor (severity
      4). Protected speech contexts remain permitted.
  - category: 10  # SEXUAL_ADULT
    severity_floor: 3
    note: >-
      Jugendschutzgesetz youth-protection floor on cross-platform
      delivery; raised to severity 3 (warn) at the jurisdiction
      layer.

# --------------------------------------------------------------------------
# Allowed contexts
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Germany safety pack. StGB §86a banned symbols and BfV-listed
    extremist orgs are treated as a jurisdictional ban; Volks-
    verhetzung (StGB §130) is treated as a strong warn. Protected
    speech (news, education, counterspeech, quoted speech) is
    preserved.
  appeal_resource_id: de_appeal_resource_v1
  opt_out_allowed: true
