# kchat.jurisdiction.vn.guardrail.v1
#
# Vietnam jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Law on Children 2016; Anti-Terrorism Law 2013.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.vn.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: vn
    - group_declared_jurisdiction: vn
    - app_store_install_region: vn
    - enterprise_managed_policy: vn
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Hiến pháp 2013 Art. 16.
  protected_classes:
    - ethnic_origin
    - religion
    - belief
    - sex
    - age
    - disability
    - social_origin
    - place_of_origin
    - language
    - political_view
  listed_extremist_orgs:
    - vn_listed_extremist_orgs_v1
  restricted_symbols:
    - vn_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2026-03-15"
    civic_window_close: "2026-05-31"
    authority_resource_id: vn_nec_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [vi]
  lexicons:
    - lexicon_id: vn_vi_lexicon_v1
      language: vi
      categories: [1, 4]
      provenance: kchat_trust_and_safety_vn_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Luật Trẻ em 2016 — Law on Children. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Luật Phòng, chống khủng bố 2013 — Anti-Terrorism Law. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Vietnam safety pack. Raises floors on child protection (Luật Trẻ em 2016) and anti-terrorism (Luật 2013). Protected speech remains permitted.
  appeal_resource_id: vn_appeal_resource_v1
  opt_out_allowed: false
