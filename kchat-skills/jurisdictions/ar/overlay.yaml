# kchat.jurisdiction.ar.guardrail.v1
#
# Argentina jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Ley 26.061 child protection; Código Penal terrorism provisions.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.ar.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: ar
    - group_declared_jurisdiction: ar
    - app_store_install_region: ar
    - enterprise_managed_policy: ar
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Ley 23.592 sobre actos discriminatorios.
  protected_classes:
    - race
    - religion
    - nationality
    - ideology
    - political_opinion
    - sex
    - gender_identity
    - sexual_orientation
    - socioeconomic_status
    - trade_union
    - disability
  listed_extremist_orgs:
    - ar_listed_extremist_orgs_v1
  restricted_symbols:
    - ar_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-08-01"
    civic_window_close: "2027-11-15"
    authority_resource_id: ar_cne_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [es]
  lexicons:
    - lexicon_id: ar_es_lexicon_v1
      language: es
      categories: [1, 4]
      provenance: kchat_trust_and_safety_ar_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Ley 26.061 de Protección Integral de los Derechos de Niñas, Niños y Adolescentes. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Código Penal Libro II Título VIII — delitos de terrorismo. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Argentina safety pack. Raises floors on child protection (Ley 26.061) and terrorism provisions (Código Penal). Protected speech remains permitted.
  appeal_resource_id: ar_appeal_resource_v1
  opt_out_allowed: true
