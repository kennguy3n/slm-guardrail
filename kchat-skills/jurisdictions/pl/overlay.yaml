# kchat.jurisdiction.pl.guardrail.v1
#
# Poland jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Kodeks Karny child protection; anti-terrorism provisions; Ustawa o IPN (limited historical-denial).
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.pl.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: pl
    - group_declared_jurisdiction: pl
    - app_store_install_region: pl
    - enterprise_managed_policy: pl
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Kodeks Karny Art. 256-257.
  protected_classes:
    - national_origin
    - ethnic_origin
    - race
    - religion
    - denomination
    - lack_of_religion
    - sex
    - age
    - disability
    - sexual_orientation
    - political_opinion
  listed_extremist_orgs:
    - pl_listed_extremist_orgs_v1
  restricted_symbols:
    - pl_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-08-15"
    civic_window_close: "2027-11-15"
    authority_resource_id: pl_pkw_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [pl]
  lexicons:
    - lexicon_id: pl_pl_lexicon_v1
      language: pl
      categories: [1, 4]
      provenance: kchat_trust_and_safety_pl_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Kodeks Karny Art. 200-202 — ochrona dzieci / pornografia dziecięca. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Kodeks Karny Art. 165a / 258 — przestępstwa terrorystyczne. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Poland safety pack. Raises floors on child protection (Kodeks Karny Art. 200-202) and terrorism offences (Art. 165a / 258). Protected speech remains permitted.
  appeal_resource_id: pl_appeal_resource_v1
  opt_out_allowed: true
