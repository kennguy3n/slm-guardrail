# kchat.jurisdiction.sa.guardrail.v1
#
# Saudi Arabia jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Child Protection System (2014); Anti-Terrorism Law 2017; Anti-Cyber Crime Law 2007.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.sa.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: sa
    - group_declared_jurisdiction: sa
    - app_store_install_region: sa
    - enterprise_managed_policy: sa
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 21
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Basic Law of Governance Art. 8.
  protected_classes:
    - religion
    - sex
    - age
    - disability
    - ethnic_origin
    - race
    - language
    - tribal_affiliation
    - nationality
  listed_extremist_orgs:
    - sa_listed_extremist_orgs_v1
  restricted_symbols:
    - sa_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2028-10-15"
    civic_window_close: "2028-12-15"
    authority_resource_id: sa_gov_resource_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [ar]
  lexicons:
    - lexicon_id: sa_ar_lexicon_v1
      language: ar
      categories: [1, 4]
      provenance: kchat_trust_and_safety_sa_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1, translit_arabic_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Child Protection System 2014 (Royal Decree M/14). Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 5
    note: >-
      Anti-Terrorism Law 2017 + Anti-Cyber Crime Law 2007. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Saudi Arabia safety pack. Raises floors on child protection (Royal Decree M/14) and anti-terrorism (2017). Protected speech remains permitted.
  appeal_resource_id: sa_appeal_resource_v1
  opt_out_allowed: false
