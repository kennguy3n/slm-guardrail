# kchat.jurisdiction.ch.guardrail.v1
#
# Switzerland jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   StGB child protection; StGB Art. 261bis anti-racism.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.ch.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: ch
    - group_declared_jurisdiction: ch
    - app_store_install_region: ch
    - enterprise_managed_policy: ch
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 16
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Bundesverfassung Art. 8 + StGB Art. 261bis.
  protected_classes:
    - race
    - ethnic_origin
    - religion
    - sexual_orientation
    - gender_identity
    - sex
    - language
    - way_of_life
    - religious_conviction
    - political_conviction
    - age
    - disability
  listed_extremist_orgs:
    - ch_listed_extremist_orgs_v1
  restricted_symbols:
    - ch_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-08-15"
    civic_window_close: "2027-10-31"
    authority_resource_id: ch_bundeskanzlei_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [de, fr, it, rm]
  lexicons:
    - lexicon_id: ch_de_lexicon_v1
      language: de
      categories: [1, 6]
      provenance: kchat_trust_and_safety_ch_v1
    - lexicon_id: ch_fr_lexicon_v1
      language: fr
      categories: [1, 6]
      provenance: kchat_trust_and_safety_ch_v1
    - lexicon_id: ch_it_lexicon_v1
      language: it
      categories: [1, 6]
      provenance: kchat_trust_and_safety_ch_v1
    - lexicon_id: ch_rm_lexicon_v1
      language: rm
      categories: [1, 6]
      provenance: kchat_trust_and_safety_ch_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      StGB Art. 197 — Pornografie mit Kindern. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 6   # HATE
    severity_floor: 4
    note: >-
      StGB Art. 261bis — Rassendiskriminierung / anti-racism. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Switzerland safety pack. Raises floors on child protection (StGB Art. 197) and anti-racism (StGB Art. 261bis). Protected speech remains permitted.
  appeal_resource_id: ch_appeal_resource_v1
  opt_out_allowed: true
