# kchat.jurisdiction.ae.guardrail.v1
#
# United Arab Emirates jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Wadeema's Law (Federal Law 3/2016); Federal Decree-Law 7/2014 anti-terrorism; Cybercrimes Law.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.ae.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: ae
    - group_declared_jurisdiction: ae
    - app_store_install_region: ae
    - enterprise_managed_policy: ae
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 21
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Federal Decree-Law 2/2015 on Combating Discrimination and Hatred.
  protected_classes:
    - religion
    - sex
    - age
    - disability
    - race
    - ethnic_origin
    - nationality
    - language
    - tribal_affiliation
  listed_extremist_orgs:
    - ae_listed_extremist_orgs_v1
  restricted_symbols:
    - ae_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-10-01"
    civic_window_close: "2027-11-15"
    authority_resource_id: ae_nec_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [ar, en]
  lexicons:
    - lexicon_id: ae_ar_lexicon_v1
      language: ar
      categories: [1, 4]
      provenance: kchat_trust_and_safety_ae_v1
    - lexicon_id: ae_en_lexicon_v1
      language: en
      categories: [1, 4]
      provenance: kchat_trust_and_safety_ae_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1, translit_arabic_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Wadeema's Law (Federal Law 3/2016) — child rights. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 5
    note: >-
      Federal Decree-Law 7/2014 — anti-terrorism. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    United Arab Emirates safety pack. Raises floors on child protection (Wadeema's Law 3/2016) and anti-terrorism (Federal Decree-Law 7/2014). Protected speech remains permitted.
  appeal_resource_id: ae_appeal_resource_v1
  opt_out_allowed: false
