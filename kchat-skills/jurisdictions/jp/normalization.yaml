# Normalization rules for the Japan jurisdiction overlay.
#
# translit_ja_v1 romanises Japanese text (Kanji / Hiragana /
# Katakana) so detector lexicons run after a consistent romanised
# form, in addition to the core transliteration ref.

schema_version: 1
nfkc: true
case_fold: true
homoglyph_map_id: homoglyph_core_v1
transliteration_refs:
  - translit_core_v1
  - translit_ja_v1
