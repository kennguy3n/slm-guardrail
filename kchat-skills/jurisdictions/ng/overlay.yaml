# kchat.jurisdiction.ng.guardrail.v1
#
# Nigeria jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Child Rights Act 2003; Terrorism Prevention Act; Cybercrimes Act 2015.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.ng.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: ng
    - group_declared_jurisdiction: ng
    - app_store_install_region: ng
    - enterprise_managed_policy: ng
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Constitution §42 + Discrimination Against Persons with Disabilities (Prohibition) Act 2018.
  protected_classes:
    - religion
    - ethnic_origin
    - tribe
    - place_of_origin
    - sex
    - age
    - disability
    - political_opinion
    - language
  listed_extremist_orgs:
    - ng_listed_extremist_orgs_v1
  restricted_symbols:
    - ng_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-02-01"
    civic_window_close: "2027-03-15"
    authority_resource_id: ng_inec_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [en]
  lexicons:
    - lexicon_id: ng_en_lexicon_v1
      language: en
      categories: [1, 4]
      provenance: kchat_trust_and_safety_ng_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Child Rights Act 2003 §31-34. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Terrorism (Prevention and Prohibition) Act 2022. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Nigeria safety pack. Raises floors on child protection (Child Rights Act 2003) and anti-terrorism (TPPA 2022). Protected speech remains permitted.
  appeal_resource_id: ng_appeal_resource_v1
  opt_out_allowed: true
