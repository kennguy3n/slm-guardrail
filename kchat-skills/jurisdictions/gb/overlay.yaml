# kchat.jurisdiction.gb.guardrail.v1
#
# United Kingdom jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Online Safety Act 2023; Terrorism Act 2000; child protection (Protection of Children Act 1978).
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.gb.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: gb
    - group_declared_jurisdiction: gb
    - app_store_install_region: gb
    - enterprise_managed_policy: gb
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Equality Act 2010 §4.
  protected_classes:
    - age
    - disability
    - gender_reassignment
    - marriage_and_civil_partnership
    - pregnancy_and_maternity
    - race
    - religion_or_belief
    - sex
    - sexual_orientation
  listed_extremist_orgs:
    - gb_home_office_proscribed_orgs_v1
  restricted_symbols:
    - gb_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-04-01"
    civic_window_close: "2027-06-30"
    authority_resource_id: gb_electoral_commission_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [en]
  lexicons:
    - lexicon_id: gb_en_lexicon_v1
      language: en
      categories: [1, 4, 7]
      provenance: kchat_trust_and_safety_gb_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Protection of Children Act 1978; Online Safety Act 2023 Part 3 child-safety duties. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Terrorism Act 2000 §12/13 — support for proscribed organisations. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 7   # SCAM_FRAUD
    severity_floor: 3
    note: >-
      Fraud Act 2006 — consumer-fraud floor. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    United Kingdom safety pack. Raises floors on child protection (Online Safety Act 2023 duties), Terrorism Act 2000 §12/13, and Fraud Act 2006. Protected speech remains permitted.
  appeal_resource_id: gb_appeal_resource_v1
  opt_out_allowed: true
