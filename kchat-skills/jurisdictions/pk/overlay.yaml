# kchat.jurisdiction.pk.guardrail.v1
#
# Pakistan jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Pakistan Penal Code child protection; Anti-Terrorism Act 1997; PECA 2016.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.pk.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: pk
    - group_declared_jurisdiction: pk
    - app_store_install_region: pk
    - enterprise_managed_policy: pk
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 21
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Constitution Art. 25-27.
  protected_classes:
    - religion
    - race
    - ethnic_origin
    - sect
    - caste
    - sex
    - gender_identity
    - age
    - disability
    - language
    - political_opinion
  listed_extremist_orgs:
    - pk_nacta_proscribed_orgs_v1
  restricted_symbols:
    - pk_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2028-11-15"
    civic_window_close: "2029-03-15"
    authority_resource_id: pk_ecp_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [ur, en]
  lexicons:
    - lexicon_id: pk_ur_lexicon_v1
      language: ur
      categories: [1, 4]
      provenance: kchat_trust_and_safety_pk_v1
    - lexicon_id: pk_en_lexicon_v1
      language: en
      categories: [1, 4]
      provenance: kchat_trust_and_safety_pk_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1, translit_arabic_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      PPC §292-A/§292-B and Prevention of Electronic Crimes Act 2016 §22. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Anti-Terrorism Act 1997 + NACTA proscribed organisations. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Pakistan safety pack. Raises floors on child protection (PPC §292 + PECA §22) and anti-terrorism (ATA 1997). Protected speech remains permitted.
  appeal_resource_id: pk_appeal_resource_v1
  opt_out_allowed: false
