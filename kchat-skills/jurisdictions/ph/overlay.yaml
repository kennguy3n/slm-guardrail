# kchat.jurisdiction.ph.guardrail.v1
#
# Philippines jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   RA 7610 child protection; Human Security Act / RA 11479 anti-terrorism.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.ph.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: ph
    - group_declared_jurisdiction: ph
    - app_store_install_region: ph
    - enterprise_managed_policy: ph
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 21
  # Protected-class enumeration from Constitution Art. III §1 + Magna Carta of Women.
  protected_classes:
    - religion
    - race
    - ethnic_origin
    - indigenous_peoples
    - sex
    - gender_identity
    - sexual_orientation
    - age
    - disability
    - civil_status
    - political_opinion
    - language
  listed_extremist_orgs:
    - ph_atc_designated_orgs_v1
  restricted_symbols:
    - ph_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2028-01-15"
    civic_window_close: "2028-05-15"
    authority_resource_id: ph_comelec_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [en, tl]
  lexicons:
    - lexicon_id: ph_en_lexicon_v1
      language: en
      categories: [1, 4]
      provenance: kchat_trust_and_safety_ph_v1
    - lexicon_id: ph_tl_lexicon_v1
      language: tl
      categories: [1, 4]
      provenance: kchat_trust_and_safety_ph_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      RA 7610 Special Protection of Children Against Abuse, Exploitation and Discrimination. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      RA 11479 Anti-Terrorism Act of 2020. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Philippines safety pack. Raises floors on child protection (RA 7610) and anti-terrorism (RA 11479). Protected speech remains permitted.
  appeal_resource_id: ph_appeal_resource_v1
  opt_out_allowed: true
