# kchat.jurisdiction.it.guardrail.v1
#
# Italy jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Codice Penale protection of minors; Legge Mancino (hate / fascist apologia); anti-terrorism.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.it.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: it
    - group_declared_jurisdiction: it
    - app_store_install_region: it
    - enterprise_managed_policy: it
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Costituzione Art. 3 + Legge Mancino-Reale.
  protected_classes:
    - race
    - ethnic_origin
    - national_origin
    - religion
    - personal_conditions
    - sex
    - sexual_orientation
    - gender_identity
    - disability
    - age
    - political_opinion
    - language
  listed_extremist_orgs:
    - it_listed_extremist_orgs_v1
  restricted_symbols:
    - it_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2028-01-15"
    civic_window_close: "2028-04-30"
    authority_resource_id: it_ministero_interno_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [it]
  lexicons:
    - lexicon_id: it_it_lexicon_v1
      language: it
      categories: [1, 4]
      provenance: kchat_trust_and_safety_it_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Codice Penale Art. 600-ter / 600-quater — pedopornografia. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Codice Penale Art. 270-bis / 414-quater — anti-terrorismo. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Italy safety pack. Raises floors on child protection (Codice Penale Art. 600-ter/quater) and anti-terrorism. Protected speech remains permitted.
  appeal_resource_id: it_appeal_resource_v1
  opt_out_allowed: true
