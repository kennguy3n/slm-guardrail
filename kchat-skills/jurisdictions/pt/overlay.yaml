# kchat.jurisdiction.pt.guardrail.v1
#
# Portugal jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Código Penal child protection; Lei 52/2003 anti-terrorismo.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.pt.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: pt
    - group_declared_jurisdiction: pt
    - app_store_install_region: pt
    - enterprise_managed_policy: pt
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Constituição Art. 13 + Lei 93/2017.
  protected_classes:
    - ancestry
    - sex
    - race
    - language
    - territory_of_origin
    - nationality
    - religion
    - political_opinion
    - ideological_opinion
    - education
    - economic_situation
    - social_condition
    - sexual_orientation
    - gender_identity
    - disability
  listed_extremist_orgs:
    - pt_listed_extremist_orgs_v1
  restricted_symbols:
    - pt_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2028-01-15"
    civic_window_close: "2028-04-30"
    authority_resource_id: pt_cne_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [pt]
  lexicons:
    - lexicon_id: pt_pt_lexicon_v1
      language: pt
      categories: [1, 4]
      provenance: kchat_trust_and_safety_pt_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Código Penal Art. 171-176 — crimes contra a autodeterminação sexual de menores. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Lei 52/2003 — lei de combate ao terrorismo. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Portugal safety pack. Raises floors on child protection (Código Penal Art. 171-176) and anti-terrorism (Lei 52/2003). Protected speech remains permitted.
  appeal_resource_id: pt_appeal_resource_v1
  opt_out_allowed: true
