# kchat.jurisdiction.sg.guardrail.v1
#
# Singapore jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Children and Young Persons Act; Internal Security Act; Online Safety Acts.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.sg.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: sg
    - group_declared_jurisdiction: sg
    - app_store_install_region: sg
    - enterprise_managed_policy: sg
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 21
  # Protected-class enumeration from Constitution Art. 12 + Maintenance of Religious Harmony Act.
  protected_classes:
    - race
    - religion
    - language
    - descent
    - place_of_birth
    - sex
    - age
    - disability
    - sexual_orientation
    - gender_identity
  listed_extremist_orgs:
    - sg_listed_extremist_orgs_v1
  restricted_symbols:
    - sg_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2030-06-15"
    civic_window_close: "2030-12-15"
    authority_resource_id: sg_eld_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [en, zh, ms, ta]
  lexicons:
    - lexicon_id: sg_en_lexicon_v1
      language: en
      categories: [1, 4]
      provenance: kchat_trust_and_safety_sg_v1
    - lexicon_id: sg_zh_lexicon_v1
      language: zh
      categories: [1, 4]
      provenance: kchat_trust_and_safety_sg_v1
    - lexicon_id: sg_ms_lexicon_v1
      language: ms
      categories: [1, 4]
      provenance: kchat_trust_and_safety_sg_v1
    - lexicon_id: sg_ta_lexicon_v1
      language: ta
      categories: [1, 4]
      provenance: kchat_trust_and_safety_sg_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1, translit_cjk_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Children and Young Persons Act 1993; Online Criminal Harms Act 2023. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Internal Security Act — offences against the State. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Singapore safety pack. Raises floors on child protection (CYPA) and internal-security offences (ISA). Protected speech remains permitted.
  appeal_resource_id: sg_appeal_resource_v1
  opt_out_allowed: false
