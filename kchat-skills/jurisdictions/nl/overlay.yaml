# kchat.jurisdiction.nl.guardrail.v1
#
# Netherlands jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Wetboek van Strafrecht (child protection Art. 240b); anti-terrorism provisions.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.nl.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: nl
    - group_declared_jurisdiction: nl
    - app_store_install_region: nl
    - enterprise_managed_policy: nl
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Algemene Wet Gelijke Behandeling + Wetboek van Strafrecht Art. 137c-f.
  protected_classes:
    - religion
    - belief
    - political_opinion
    - race
    - sex
    - nationality
    - sexual_orientation
    - marital_status
    - disability
    - chronic_illness
    - age
  listed_extremist_orgs:
    - nl_listed_extremist_orgs_v1
  restricted_symbols:
    - nl_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-01-15"
    civic_window_close: "2027-03-31"
    authority_resource_id: nl_kiesraad_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [nl]
  lexicons:
    - lexicon_id: nl_nl_lexicon_v1
      language: nl
      categories: [1, 4]
      provenance: kchat_trust_and_safety_nl_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Wetboek van Strafrecht Art. 240b — kinderpornografie. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Wetboek van Strafrecht Art. 83-83a — terroristische misdrijven. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Netherlands safety pack. Raises floors on child protection (Art. 240b Sr) and terrorism offences (Art. 83 Sr). Protected speech remains permitted.
  appeal_resource_id: nl_appeal_resource_v1
  opt_out_allowed: true
