# kchat.jurisdiction.tw.guardrail.v1
#
# Taiwan jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Child and Youth Welfare and Protection Act; Anti-Infiltration Act / terrorism provisions.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.tw.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: tw
    - group_declared_jurisdiction: tw
    - app_store_install_region: tw
    - enterprise_managed_policy: tw
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 20
  # Protected-class enumeration from 中華民國憲法 Art. 7 + Gender Equality Act.
  protected_classes:
    - sex
    - gender_identity
    - sexual_orientation
    - age
    - race
    - ethnic_origin
    - nationality
    - religion
    - political_opinion
    - disability
    - marital_status
    - language
    - indigenous_status
  listed_extremist_orgs:
    - tw_listed_extremist_orgs_v1
  restricted_symbols:
    - tw_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2027-09-15"
    civic_window_close: "2028-01-15"
    authority_resource_id: tw_cec_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [zh]
  lexicons:
    - lexicon_id: tw_zh_lexicon_v1
      language: zh
      categories: [1, 4]
      provenance: kchat_trust_and_safety_tw_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1, translit_cjk_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      兒童及少年福利與權益保障法 (Child and Youth Welfare and Rights Protection Act). Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      反滲透法 Anti-Infiltration Act; 刑法 §149-151 incitement. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Taiwan safety pack. Raises floors on child protection (兒少權法) and anti-infiltration provisions. Protected speech remains permitted.
  appeal_resource_id: tw_appeal_resource_v1
  opt_out_allowed: true
