# kchat.jurisdiction.dz.guardrail.v1
#
# Algeria jurisdiction overlay — Phase 6 expansion country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Loi 15-12 child protection; Code Pénal Art. 87 bis anti-terrorism.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.dz.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: dz
    - group_declared_jurisdiction: dz
    - app_store_install_region: dz
    - enterprise_managed_policy: dz
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  protected_classes:
    - sex
    - race
    - ethnic_origin
    - religion
    - disability
    - language
  listed_extremist_orgs:
    - dz_listed_extremist_orgs_v1
  restricted_symbols:
    - dz_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2026-09-01"
    civic_window_close: "2026-10-31"
    authority_resource_id: dz_anie_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [ar, fr]
  lexicons:
    - lexicon_id: dz_ar_lexicon_v1
      language: ar
      categories: [1, 4]
      provenance: kchat_trust_and_safety_dz_v1
    - lexicon_id: dz_fr_lexicon_v1
      language: fr
      categories: [1, 4]
      provenance: kchat_trust_and_safety_dz_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Loi 15-12 du 15 juillet 2015 relative à la protection de l'enfant. Protected-speech contexts (quoted speech,
      news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Code Pénal Art. 87 bis (terrorisme et subversion). Protected-speech contexts (quoted speech,
      news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Algeria safety pack. Raises floors on child protection (Loi 15-12) and terrorism (Code Pénal Art. 87 bis). Protected speech remains permitted.
  appeal_resource_id: dz_appeal_resource_v1
  opt_out_allowed: true
