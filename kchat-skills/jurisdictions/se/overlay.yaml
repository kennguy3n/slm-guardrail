# kchat.jurisdiction.se.guardrail.v1
#
# Sweden jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Brottsbalk child protection (Chapter 16 §10a); Terrorbrottslag (2003:148).
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.se.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: se
    - group_declared_jurisdiction: se
    - app_store_install_region: se
    - enterprise_managed_policy: se
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 20
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Diskrimineringslag (2008:567).
  protected_classes:
    - sex
    - transgender_identity_or_expression
    - ethnic_origin
    - religion_or_belief
    - disability
    - sexual_orientation
    - age
  listed_extremist_orgs:
    - se_listed_extremist_orgs_v1
  restricted_symbols:
    - se_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2026-07-15"
    civic_window_close: "2026-09-15"
    authority_resource_id: se_valmyndigheten_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [sv]
  lexicons:
    - lexicon_id: se_sv_lexicon_v1
      language: sv
      categories: [1, 4]
      provenance: kchat_trust_and_safety_se_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Brottsbalk Kap. 16 §10a — barnpornografibrott. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Terroristbrottslag (2022:666). Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Sweden safety pack. Raises floors on child protection (Brottsbalk 16:10a) and terrorism offences (Terroristbrottslag 2022). Protected speech remains permitted.
  appeal_resource_id: se_appeal_resource_v1
  opt_out_allowed: true
