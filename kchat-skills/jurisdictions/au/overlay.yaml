# kchat.jurisdiction.au.guardrail.v1
#
# Australia jurisdiction overlay — Phase 5 second wave country pack.
# Layered on top of kchat.global.guardrail.baseline.
# Concrete values below reflect the primary legal framework summarised as:
#   Criminal Code Act 1995 child exploitation; Criminal Code terrorism; Online Safety Act 2021.
# Legal and cultural reviewers are named in ``signers``; overlays
# inherit the privacy-contract rule against embedded harm strings,
# so everything below is catalogue-only.

skill_id: kchat.jurisdiction.au.guardrail.v1
parent: kchat.global.guardrail.baseline
schema_version: 1
# ~18 months from 2026-04-29 — the maximum permitted by the compiler.
expires_on: "2027-10-29"
signers: [trust_and_safety, legal_review, cultural_review]

# --------------------------------------------------------------------------
# Activation
# --------------------------------------------------------------------------
activation:
  criteria:
    - user_selected_region: au
    - group_declared_jurisdiction: au
    - app_store_install_region: au
    - enterprise_managed_policy: au
  forbidden_criteria:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion

# --------------------------------------------------------------------------
# Local definitions
# --------------------------------------------------------------------------
local_definitions:
  legal_age_general: 18
  legal_age_sexual_content_consumer: 18
  legal_age_marketplace_alcohol: 18
  legal_age_marketplace_tobacco: 18
  # Protected-class enumeration from Racial Discrimination Act 1975 + Sex Discrimination Act 1984 + Disability Discrimination Act 1992.
  protected_classes:
    - race
    - colour
    - sex
    - sexual_orientation
    - gender_identity
    - intersex_status
    - age
    - disability
    - religion
    - marital_or_relationship_status
    - pregnancy
    - breastfeeding
    - family_responsibilities
    - national_origin
    - ethnic_origin
  listed_extremist_orgs:
    - au_home_affairs_listed_terrorist_orgs_v1
  restricted_symbols:
    - au_restricted_symbols_catalogue_v1
  election_rules:
    civic_window_open:  "2028-03-01"
    civic_window_close: "2028-05-31"
    authority_resource_id: au_aec_authority_v1

# --------------------------------------------------------------------------
# Local language assets
# --------------------------------------------------------------------------
local_language_assets:
  primary_languages: [en]
  lexicons:
    - lexicon_id: au_en_lexicon_v1
      language: en
      categories: [1, 4]
      provenance: kchat_trust_and_safety_au_v1
  normalization:
    nfkc: true
    case_fold: true
    homoglyph_map_id: homoglyph_core_v1
    transliteration_refs: [translit_core_v1]

# --------------------------------------------------------------------------
# Overrides
# --------------------------------------------------------------------------
overrides:
  - category: 1   # CHILD_SAFETY
    severity_floor: 5
    note: >-
      Criminal Code Act 1995 Part 10.6 Division 474 — child exploitation; Online Safety Act 2021. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.
  - category: 4   # EXTREMISM
    severity_floor: 4
    note: >-
      Criminal Code Act 1995 Part 5.3 — terrorism. Protected-speech contexts (quoted speech, news, education, counterspeech) remain permitted.

# --------------------------------------------------------------------------
# Allowed contexts — preserve all four protected-speech carve-outs.
# --------------------------------------------------------------------------
allowed_contexts:
  - QUOTED_SPEECH_CONTEXT
  - NEWS_CONTEXT
  - EDUCATION_CONTEXT
  - COUNTERSPEECH_CONTEXT

# --------------------------------------------------------------------------
# User notice
# --------------------------------------------------------------------------
user_notice:
  visible_pack_summary: >-
    Australia safety pack. Raises floors on child protection (Criminal Code 1995 Part 10.6; Online Safety Act 2021) and terrorism (Part 5.3). Protected speech remains permitted.
  appeal_resource_id: au_appeal_resource_v1
  opt_out_allowed: true
