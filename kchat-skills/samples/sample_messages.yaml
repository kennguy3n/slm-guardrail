# Sample message corpus for the KChat SLM Guardrail demo + benchmark harness.
#
# Spec references:
#
# * PHASES.md Phase 6 — "Performance optimization benchmarking" feeds these
#   cases through the full hybrid local pipeline.
# * ARCHITECTURE.md "Privacy contract" — every case below is a synthetic
#   pattern. No real PII, no real CSAM-adjacent text, and no live phishing
#   URLs are present. The deterministic detectors react to the *shapes*
#   (high-risk TLDs, email / phone / credit-card-shaped patterns, scam
#   keyword combinations) without the corpus carrying actual harm.
#
# Each case:
#
#   - case_id              — stable string id, used in benchmark reports
#   - message              — fields of `kchat.guardrail.local_signal.v1.message`
#   - context              — fields of `kchat.guardrail.local_signal.v1.context`
#   - expected_category    — taxonomy id (0..15) the *deterministic* layer +
#                             MockSLMAdapter is expected to land on. Real SLM
#                             output may differ; the demo prints both.
#   - expected_severity    — 0..5; expected severity from the deterministic
#                             layer. CHILD_SAFETY (1) is pinned at 5.
#   - description          — plain-English description (no operative payload)
#
# The corpus is *additive*: extending it does not regress prior cases.
# When adding a case, prefer descriptive text over literal harm strings —
# the deterministic detectors react to detector-shaped patterns, and
# the SLM reasons over the descriptors plus the surrounding context.

