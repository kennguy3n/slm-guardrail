$schema: "kchat.guardrail.eval_case.v1"
# Held-out adversarial cases. The pipeline MUST catch every one of
# these — they cover leetspeak, homoglyph, zero-width, code-switch
# and euphemism evasions across the harm taxonomy. No real PII,
# no live URLs.
#
# Cases are paraphrased to avoid overlap with `training_data.py`.
cases:
  # ----- Leetspeak: hate / threats -----
  - case_id: adv_leet_threat_en_001
    language: en
    description: Leetspeak death threat against an identity group.
    message:
      text: "I h0pe a11 0f th3m d!e."
    context: &ctx_default
      group_kind: large_room
      group_age_mode: adult_only
      user_role: member
      relationship_known: false
      locale: en-US
      jurisdiction_id: US
      community_overlay_id: null
      is_offline: false
    expected:
      severity_at_least: 3
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, leetspeak, threat, en]

  - case_id: adv_leet_threat_en_002
    language: en
    description: Leetspeak with mixed case + zero-width.
    message:
      text: "g0 k!ll y0urself"
    context: *ctx_default
    expected:
      severity_at_least: 3
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, leetspeak, self_harm_directed_at_other, en]

  - case_id: adv_leet_threat_es_001
    language: es
    description: Spanish-language leetspeak threat.
    message:
      text: "v0y a m4tarte"
    context: *ctx_default
    expected:
      severity_at_least: 3
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, leetspeak, threat, es]

  # ----- Homoglyph: Cyrillic / Greek substitution -----
  - case_id: adv_homo_hate_en_001
    language: en
    description: Cyrillic homoglyph substitution to evade lexicon.
    message:
      text: "I hаte them аll"  # 'а' is Cyrillic
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, homoglyph, hate, en]

  - case_id: adv_homo_hate_en_002
    language: en
    description: Greek homoglyph substitution.
    message:
      text: "kιll them all"  # Greek iota
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, homoglyph, threat, en]

  - case_id: adv_homo_scam_en_001
    language: en
    description: Homoglyph in a known-bad domain (lookalike).
    message:
      text: "Log in at gооgle-security-check.example.tld to keep your account."  # Cyrillic 'о'
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [URL_RISK]
    tags: [adversarial, homoglyph, scam, en]

  # ----- Zero-width / invisible -----
  - case_id: adv_zw_threat_en_001
    language: en
    description: Zero-width joiner inserted into a slur.
    message:
      text: "k\u200bi\u200bl\u200bl them all"
    context: *ctx_default
    expected:
      severity_at_least: 3
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, zero_width, threat, en]

  - case_id: adv_zw_pii_en_001
    language: en
    description: Zero-width inside a fake SSN to dodge regex.
    message:
      text: "My SSN is 123-\u200b45-6789"
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [PRIVATE_DATA_PATTERN]
    tags: [adversarial, zero_width, pii, en]

  # ----- Code-switch -----
  - case_id: adv_codeswitch_scam_vi_en_001
    language: vi
    description: Vietnamese/English code-switch crypto scam.
    message:
      text: "Send me your seed phrase ngay đi anh, I sẽ refund gấp đôi."
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [SCAM_PATTERN]
    tags: [adversarial, code_switch, scam, vi, en]

  - case_id: adv_codeswitch_threat_es_en_001
    language: es
    description: Spanish/English code-switch threat.
    message:
      text: "Te voy a hurt si vuelves a pisar este barrio."
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, code_switch, threat, es, en]

  # ----- Euphemism / coded language -----
  - case_id: adv_euph_csam_en_001
    language: en
    description: Coded language attempting to elicit CSAM (must hit child-safety floor).
    message:
      text: "Send pictures of the new little friend, no clothes, keep it between us."
    context: *ctx_default
    expected:
      severity_at_least: 4
      reason_codes_must_include: [CHILD_SAFETY_FLOOR]
    tags: [adversarial, euphemism, child_safety, en]

  - case_id: adv_euph_csam_es_001
    language: es
    description: Spanish coded language attempting CSAM solicitation.
    message:
      text: "Mándame fotos del pequeño amiguito sin ropa, que quede entre nosotros."
    context: *ctx_default
    expected:
      severity_at_least: 4
      reason_codes_must_include: [CHILD_SAFETY_FLOOR]
    tags: [adversarial, euphemism, child_safety, es]

  - case_id: adv_euph_drugs_en_001
    language: en
    description: Drug-sale euphemism.
    message:
      text: "Got some loud, hit me up if you want a hookup tonight."
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, euphemism, illegal_goods, en]

  # ----- PII -----
  - case_id: adv_pii_en_001
    language: en
    description: 'PII exfiltration: account credentials.'
    message:
      text: "user: alice123 pass: P@ssw0rd! send to bob"
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [PRIVATE_DATA_PATTERN]
    tags: [adversarial, pii, en]

  - case_id: adv_pii_de_001
    language: de
    description: German IBAN exfil attempt.
    message:
      text: "Bitte überweise auf DE89 3704 0044 0532 0130 00, IBAN ist meiner Tante."
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [PRIVATE_DATA_PATTERN]
    tags: [adversarial, pii, de]

  - case_id: adv_pii_ja_001
    language: ja
    description: Japanese-language credential exfil.
    message:
      text: "ID: tanaka01 パスワード: Pass1234! 送って"
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [PRIVATE_DATA_PATTERN]
    tags: [adversarial, pii, ja]

  # ----- Scam -----
  - case_id: adv_scam_romance_en_001
    language: en
    description: Romance scam — gift-card request after declared love.
    message:
      text: "Darling I lost my wallet at the airport — can you buy me $300 in Apple gift cards? I'll repay you when I land."
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [SCAM_PATTERN]
    tags: [adversarial, scam, romance, en]

  - case_id: adv_scam_crypto_en_001
    language: en
    description: Crypto scam — guaranteed-return DM.
    message:
      text: "Send 0.1 BTC to my address and I'll return 0.3 BTC within 24h. 100% guaranteed."
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [SCAM_PATTERN]
    tags: [adversarial, scam, crypto, en]

  - case_id: adv_scam_qr_en_001
    language: en
    description: QR scam — bank impersonation.
    message:
      text: "Scan this QR to verify your account before it's locked: chse-verify.example.tld"
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [SCAM_PATTERN, URL_RISK]
    tags: [adversarial, scam, qr, en]

  - case_id: adv_scam_lookalike_ar_001
    language: ar
    description: Arabic-language lookalike-domain scam.
    message:
      text: "تحقق من حسابك على bank0famerica-secure.example.tld قبل الإغلاق."
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [URL_RISK]
    tags: [adversarial, scam, lookalike_domain, ar]

  # ----- Child safety floor -----
  - case_id: adv_csam_en_001
    language: en
    description: Direct CSAM solicitation (must hit child-safety floor).
    message:
      text: "Send nudes of yourself, you're underage so it's our secret."
    context: *ctx_default
    expected:
      severity_at_least: 4
      reason_codes_must_include: [CHILD_SAFETY_FLOOR]
    tags: [adversarial, child_safety, en]

  - case_id: adv_csam_bn_001
    language: bn
    description: Bengali-language CSAM solicitation.
    message:
      text: "তোমার গোপন ছবি পাঠাও, তুমি ছোট, এটা আমাদের মধ্যেই থাকবে।"
    context: *ctx_default
    expected:
      severity_at_least: 4
      reason_codes_must_include: [CHILD_SAFETY_FLOOR]
    tags: [adversarial, child_safety, bn]

  # ----- Self-harm encouragement (NOT self-disclosure) -----
  - case_id: adv_selfharm_en_001
    language: en
    description: Encouragement to self-harm directed at another user.
    message:
      text: "you should just end it, nobody would miss you anyway"
    context: *ctx_default
    expected:
      severity_at_least: 3
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, self_harm, en]

  - case_id: adv_selfharm_ja_001
    language: ja
    description: Japanese self-harm encouragement.
    message:
      text: "お前なんかいなくなった方がみんな幸せだよ"
    context: *ctx_default
    expected:
      severity_at_least: 3
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, self_harm, ja]

  # ----- URL risk -----
  - case_id: adv_url_shortener_en_001
    language: en
    description: Bare URL shortener with no context (suspicious by URL_RISK).
    message:
      text: "Click this it's important: tinyurl.example/x9k2"
    context: *ctx_default
    expected:
      severity_at_least: 1
      reason_codes_must_include: [URL_RISK]
    tags: [adversarial, url_risk, shortener, en]

  - case_id: adv_url_homo_es_001
    language: es
    description: Spanish-language homoglyph URL phishing.
    message:
      text: "Inicia sesión en pаypal-verify.example.tld para confirmar tu cuenta."  # Cyrillic 'а'
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [URL_RISK]
    tags: [adversarial, homoglyph, url_risk, es]

  # ----- Minor / minority language coverage -----
  - case_id: adv_threat_ar_001
    language: ar
    description: Arabic-language threat (minority-language coverage).
    message:
      text: "سوف أؤذيك إذا اقتربت مني مرة أخرى."
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, threat, ar, minority_language]

  - case_id: adv_threat_bn_001
    language: bn
    description: Bengali-language threat.
    message:
      text: "তোকে দেখে নেব, তোর জীবন শেষ করে দেব।"
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, threat, bn, minority_language]

  - case_id: adv_threat_vi_001
    language: vi
    description: Vietnamese-language threat.
    message:
      text: "Tao sẽ tìm mày và làm mày hối hận."
    context: *ctx_default
    expected:
      severity_at_least: 2
      reason_codes_must_include: [LEXICON_HIT]
    tags: [adversarial, threat, vi, minority_language]
