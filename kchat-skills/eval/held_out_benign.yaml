$schema: "kchat.guardrail.eval_case.v1"
# Held-out benign cases. The pipeline must NOT flag any of these.
# Coverage: news, education, counterspeech, reclaimed language,
# identity discussion, health discussion, political discourse —
# across English, Vietnamese, Spanish, German, Japanese, Bengali,
# Arabic.
#
# These cases are paraphrased to avoid overlap with
# `training_data.py` (training corpus). The compiler checks
# overlap at pack-build time.
cases:
  # ----- News coverage (en) -----
  - case_id: benign_news_en_001
    language: en
    description: News report referencing a hate-crime quote.
    message:
      text: "Reuters cited witnesses who said the attacker shouted slurs before fleeing."
      quoted_from_user: false
    context: &ctx_news_en
      group_kind: large_room
      group_age_mode: adult_only
      user_role: member
      relationship_known: false
      locale: en-US
      jurisdiction_id: US
      community_overlay_id: news.reuters
      is_offline: false
    expected:
      category: 0
      severity: 0
      reason_codes_must_include: [NEWS_CONTEXT]
    tags: [benign_false_positive, news_coverage, en]

  - case_id: benign_news_en_002
    language: en
    description: News report on a phishing scam wave.
    message:
      text: "The agency warned that a new wave of phishing emails is impersonating tax authorities."
    context: *ctx_news_en
    expected:
      category: 0
      severity: 0
      reason_codes_must_include: [NEWS_CONTEXT]
    tags: [benign_false_positive, news_coverage, en]

  - case_id: benign_news_en_003
    language: en
    description: Court reporter quoting a slur used as evidence.
    message:
      text: "Court documents quote the defendant using the word as part of the prosecution's case."
    context: *ctx_news_en
    expected:
      category: 0
      severity: 0
      reason_codes_must_include: [NEWS_CONTEXT]
    tags: [benign_false_positive, news_coverage, en]

