# kchat.global.guardrail.baseline — Phase 0 STUB
#
# STATUS: Phase 0 stub. The full implementation (privacy rules, input
# contract details, runtime instruction, etc.) lands in Phase 1. This stub
# wires together the structural primitives produced in Phase 0:
# taxonomy.yaml, severity.yaml, output_schema.json (and, when authored,
# local_signal_schema.json + privacy_contract.yaml) so downstream tooling
# and tests can resolve them.
#
# The global baseline is ALWAYS active. No overlay may remove a category,
# change its ID, weaken severity for child safety, or alter the privacy
# rules. See ARCHITECTURE.md "Global Baseline Skill".

skill_id: kchat.global.guardrail.baseline
schema_version: 1
phase: 0
stub: true
parent: null
status: stub

# Structural references resolved at compile time. Paths are relative to
# this file's directory (kchat-skills/global/).
references:
  taxonomy:              ./taxonomy.yaml
  severity:              ./severity.yaml
  output_schema:         ./output_schema.json
  # The following are also Phase 0 deliverables and will be authored in
  # subsequent commits; the references are pre-wired so the compiler can
  # validate the bundle once they exist.
  local_signal_schema:   ./local_signal_schema.json   # SLM input contract
  privacy_contract:      ./privacy_contract.yaml      # 8 non-negotiable privacy rules

# Decision policy thresholds — hard-coded in the runtime; the SLM cannot
# override them. Source: ARCHITECTURE.md "Decision Policy".
decision_policy:
  thresholds:
    label_only:            0.45
    warn:                  0.62
    strong_warn:           0.78
    critical_intervention: 0.85
  uncertainty_handling:
    below_label_only:
      action: emit_safe
      note: >-
        If the SLM's confidence falls below the lowest threshold (0.45)
        for any non-zero category, the runtime treats the message as
        SAFE (category 0, severity 0) and emits no label.
    tie_break:
      rule: lower_numbered_category_wins
      note: >-
        Tied categories at the same severity break in favour of the
        lower-numbered category (canonical taxonomy order).

# Skill selection logic — how the active skill bundle is composed and how
# overlays are reconciled. Source: ARCHITECTURE.md "Skill Selection Logic".
skill_selection:
  preferred_inputs:
    - user_selected_region              # explicit, in-app setting
    - group_declared_jurisdiction       # set by group admin
    - app_store_install_region          # billing / store region
    - enterprise_managed_policy         # MDM / managed device
    - explicit_community_overlay_id     # set by group admin
  avoid_inputs:
    - gps_location
    - ip_geolocation
    - inferred_nationality
    - inferred_ethnicity
    - inferred_religion
    - network_operator_metadata
  conflict_resolution:
    severity:
      rule: take_max
      note: >-
        When global, jurisdiction, and community overlays disagree on
        severity for the same category, the highest severity wins.
    category:
      rule: most_specific_overlay
      note: >-
        Community overlay > jurisdiction overlay > global baseline.
    action:
      rule: most_protective
      note: >-
        Across overlays, the most protective action for the user wins
        (e.g. strong_warn > warn > label_only).
    privacy_rules:
      rule: immutable
      note: >-
        Privacy rules from the global baseline are immutable. No overlay
        may relax them; the compiler rejects packs that try.
    child_safety:
      rule: floor_5
      note: >-
        Any positive CHILD_SAFETY signal pins severity to 5 regardless
        of overlay configuration.

# Child safety policy — highest priority. Source: ARCHITECTURE.md
# "Child Safety Policy". This block is a stub of the full policy that
# will be expanded in Phase 1; the severity floor and forbidden-upload
# rule are load-bearing and must remain stable across phases.
child_safety_policy:
  priority: highest
  severity_floor: 5
  applies_when:
    - group_age_mode == "minor_present"
    - any participant is flagged as minor by managed-device policy
    - jurisdiction overlay declares a minor-protection rule that matches
  detectors:
    - csam_indicators              # opaque local descriptor only
    - grooming_patterns            # lexicon + SLM contextual
    - sextortion_patterns          # lexicon + SLM contextual
    - request_for_private_meeting_with_minor
  actions:
    critical_intervention: true
    block_preview: true
    surface_report_flow: true
    surface_local_resources: true
  forbidden:
    - upload of detected content, descriptors, hashes, or evidence to any
      server by default
    - any flow that depends on remote service availability
  user_notice:
    rationale_id: child_safety_floor_v1
    resource_link_id: child_safety_resources_v1

# Privacy rules — the full eight non-negotiable rules will be authored as
# kchat-skills/global/privacy_contract.yaml in a subsequent Phase 0 commit
# and validated by the compiler in Phase 4. This block records the
# reference and the immutability constraint; no overlay may relax these
# rules.
privacy_rules:
  reference: ./privacy_contract.yaml
  immutable: true
  note: >-
    The full privacy contract (eight non-negotiable rules) lives in
    privacy_contract.yaml. Every authored skill pack — including this
    baseline stub — inherits the contract verbatim.
