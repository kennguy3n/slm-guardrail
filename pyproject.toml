[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "kchat-slm-guardrail"
version = "0.0.0"
description = "KChat SLM Guardrail Skills — on-device safety skill packs for E2EE messaging."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "TBD" }
dependencies = []

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "PyYAML>=6.0",
    "jsonschema>=4.0",
    "cryptography>=42.0",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["kchat-skills/tests"]
python_files = ["test_*.py"]
addopts = "-ra"
pythonpath = ["kchat-skills/compiler"]
